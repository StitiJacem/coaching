<div class="flex min-h-screen bg-gosport-dark text-white font-sans relative overflow-hidden">
    
    <!-- Sophisticated Mesh Background -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <!-- Main deep gradient -->
        <div class="absolute inset-0 bg-[#020617]"></div>
        
        <!-- Subtle theme-matched glows -->
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-gosport-orange/5 rounded-full blur-[120px]"></div>
        <div class="absolute top-[20%] -right-[5%] w-[30%] h-[30%] bg-blue-900/10 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-[10%] left-[20%] w-[50%] h-[50%] bg-[#111a2e]/20 rounded-full blur-[150px]"></div>
        
        <!-- Surface texture/noise (optional but adds premium feel) -->
        <div class="absolute inset-0 opacity-[0.015] bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
    </div>

    <!-- Content remains in relative z-10 -->
    <div class="hidden md:block relative z-10">
        <app-sidebar></app-sidebar>
    </div>


    <div *ngIf="mobileMenuOpen" (click)="mobileMenuOpen = false"
        class="fixed inset-0 bg-black/80 z-40 md:hidden transition-opacity"></div>
    <div *ngIf="mobileMenuOpen"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-gosport-surface md:hidden transform transition-transform">
        <app-sidebar></app-sidebar>
    </div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">

        <header
            class="h-16 border-b border-gosport-border bg-gosport-dark/80 backdrop-blur-md flex items-center justify-between px-4 md:px-8 sticky top-0 z-30">
            <div class="flex items-center gap-4">

                <button (click)="mobileMenuOpen = true" class="md:hidden p-2 text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>


                <!-- Removed Search Bar as requested -->
            </div>

            <div class="flex items-center gap-3">
                <!-- Language Switcher -->
                <div class="relative group">
                    <button (click)="toggleLanguage()" class="flex items-center gap-2 px-3 py-1.5 bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700 rounded-xl transition-all">
                        <span class="text-xs font-bold">{{ currentLang === 'fr' ? 'FR' : 'EN' }}</span>
                        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div *ngIf="langOpen" class="absolute right-0 mt-2 w-24 bg-gosport-surface border border-gosport-border rounded-xl shadow-2xl z-[60] overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
                        <button (click)="setLanguage('fr')" class="w-full px-4 py-2 text-left text-xs font-bold hover:bg-white/5 transition-colors" [class.text-gosport-orange]="currentLang === 'fr'">Français</button>
                        <button (click)="setLanguage('en')" class="w-full px-4 py-2 text-left text-xs font-bold hover:bg-white/5 transition-colors" [class.text-gosport-orange]="currentLang === 'en'">English</button>
                    </div>
                </div>

                <!-- Messaging Popup Trigger -->
                <div class="relative">
                    <button (click)="toggleMessaging()" class="p-2 text-slate-400 hover:text-white transition-colors relative group">
                        <lucide-icon name="message-circle" class="w-5 h-5"></lucide-icon>
                        <span *ngIf="unreadMessages > 0" class="absolute top-1 right-1 w-2 h-2 bg-gosport-orange rounded-full"></span>
                        <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-0 h-0.5 bg-gosport-orange group-hover:w-full transition-all"></div>
                    </button>
                    
                    <!-- Messaging Popup -->
                    <div *ngIf="messagingOpen" class="absolute right-0 mt-2 w-[400px] h-[550px] bg-gosport-surface border border-gosport-border rounded-2xl shadow-2xl z-[60] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                        <div class="p-4 border-b border-gosport-border bg-gosport-dark/50 flex items-center justify-between">
                            <h3 class="font-black text-sm text-white tracking-tight uppercase">Messages</h3>
                            <div class="flex items-center gap-2">
                                <button (click)="messagingOpen = false" class="p-1.5 text-slate-500 hover:text-white hover:bg-white/5 rounded-lg transition-colors">
                                    <lucide-icon name="x" class="w-4 h-4"></lucide-icon>
                                </button>
                            </div>
                        </div>
                        <div class="flex-1 overflow-hidden relative">
                            <!-- Integrated Messaging Component -->
                            <app-messaging-view [isPopup]="true"></app-messaging-view>
                        </div>
                        <div class="p-3 bg-gosport-dark/30 border-t border-gosport-border text-center">
                            <a routerLink="/dashboard/messaging" (click)="messagingOpen = false" class="text-[10px] font-black uppercase tracking-widest text-gosport-orange hover:text-white transition-colors">Ouvrir en plein écran</a>
                        </div>
                    </div>
                </div>

                <div class="h-6 w-px bg-slate-800 mx-1"></div>

                <div class="relative">
                    <button (click)="toggleNotifications()" class="relative p-2 text-slate-400 hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span *ngIf="unreadCount > 0"
                            class="absolute top-1 right-1 min-w-[18px] h-[18px] px-1 flex items-center justify-center bg-gosport-orange text-white text-xs font-bold rounded-full">
                            {{ unreadCount > 9 ? '9+' : unreadCount }}
                        </span>
                    </button>
                    <div *ngIf="notificationsOpen"
                        class="absolute right-0 mt-1 w-80 max-h-96 overflow-y-auto bg-gosport-surface border border-gosport-border rounded-xl shadow-xl z-50">
                        <div class="p-3 border-b border-gosport-border">
                            <h3 class="font-bold text-white">Notifications</h3>
                        </div>
                        <div *ngIf="notifications.length === 0" class="p-6 text-center text-slate-500 text-sm">
                            No notifications
                        </div>
                        <div *ngFor="let n of notifications" (click)="markAsRead(n)"
                            class="p-4 border-b border-gosport-border hover:bg-white/5 cursor-pointer relative group"
                            [ngClass]="{'bg-orange-500/10': !n.read}">
                            <div class="flex justify-between items-start pr-6">
                                <p class="font-medium text-white text-sm">{{ n.title }}</p>
                                <button (click)="deleteNotification($event, n)" class="absolute right-4 top-4 text-slate-500 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <p *ngIf="n.body" class="text-slate-400 text-xs mt-0.5">{{ n.body }}</p>
                            <!-- Nutrition Invite Actions -->
                            <div *ngIf="n.type === 'nutrition_invite' && !respondedIds.has(n.id)" class="mt-3 flex gap-2">
                                <button
                                    (click)="acceptNutritionInvite($event, n)"
                                    [disabled]="processingIds.has(n.id)"
                                    class="flex items-center gap-1 bg-gosport-orange hover:bg-orange-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-[11px] font-bold px-3 py-1.5 rounded transition">
                                    <svg *ngIf="processingIds.has(n.id)" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                                    </svg>
                                    Accepter
                                </button>
                                <button
                                    (click)="rejectNutritionInvite($event, n)"
                                    [disabled]="processingIds.has(n.id)"
                                    class="bg-slate-700 hover:bg-slate-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-[11px] font-bold px-3 py-1.5 rounded transition">
                                    Refuser
                                </button>
                            </div>
                            <p class="text-slate-500 text-[10px] mt-2">{{ formatNotificationDate(n.created_at) }}</p>
                        </div>
                    </div>
                </div>

                <div class="h-8 w-px bg-slate-800 mx-1 hidden md:block"></div>


                <div class="flex items-center gap-3">

                    <div class="text-right hidden md:block">
                        <p class="text-sm font-bold text-white">{{ roleService.user.name }}</p>
                        <span
                            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wider"
                            [ngClass]="badgeVariants[roleService.currentRole]">
                            {{ roleService.user.roleLabel }}
                        </span>
                    </div>
                    <div
                        class="w-10 h-10 rounded-full overflow-hidden bg-slate-700 border border-slate-600 flex items-center justify-center">
                        <img *ngIf="roleService.user.avatar" [src]="roleService.user.avatar"
                            class="w-full h-full object-cover" alt="">
                        <span *ngIf="!roleService.user.avatar" class="font-bold text-white">{{
                            roleService.user.name.substring(0,2) }}</span>
                    </div>
                </div>
            </div>
        </header>


        <main class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth">
            <div class="max-w-7xl mx-auto">
                <ng-content></ng-content>
            </div>
        </main>
    </div>
</div>

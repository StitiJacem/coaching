<aside class="flex flex-col w-64 h-screen sticky top-0 bg-gosport-surface border-r border-gosport-border z-50">

    <div class="p-6 flex items-center gap-3">
        <div
            class="w-8 h-8 bg-gosport-orange rounded flex items-center justify-center transform -skew-x-12 shadow-lg shadow-gosport-orange/20">
            <span class="font-display font-bold text-xl text-white transform skew-x-12">G</span>
        </div>
        <span class="font-display font-bold text-2xl text-white tracking-widest">GOSPORT</span>
    </div>


    <nav class="flex-1 px-3 py-4 space-y-6 overflow-y-auto custom-scrollbar">
        <div class="space-y-1">
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Navigation</p>
            <a *ngFor="let item of roleService.navItems" [routerLink]="item.path" [ngClass]="isActive(item.path)
                   ? 'bg-gosport-orange text-white shadow-lg shadow-gosport-orange/20'
                   : 'text-slate-400 hover:bg-slate-800 hover:text-white'"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group relative">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
                </svg>
                <span class="font-medium" [ngClass]="isActive(item.path) ? 'font-bold' : ''">{{ item.label }}</span>
                <div *ngIf="isActive(item.path)" class="absolute right-2 w-1.5 h-1.5 rounded-full bg-white"></div>
            </a>
        </div>
    </nav>


    <div class="p-3 border-t border-gosport-border space-y-2">

        <div class="relative cursor-pointer" [routerLink]="['/dashboard/profile-view', roleService.currentRole, roleService.entityId]">
            <div class="flex items-center gap-3 p-2 rounded-xl w-full text-left group hover:bg-white/5 transition-colors">
                <div
                    class="w-10 h-10 rounded-full overflow-hidden bg-slate-700 border border-slate-600 flex items-center justify-center">
                    <img *ngIf="roleService.user.avatar" [src]="roleService.user.avatar"
                        class="w-full h-full object-cover" alt="">
                    <span *ngIf="!roleService.user.avatar" class="font-bold text-white text-sm">{{
                        roleService.user.name.substring(0,2) }}</span>
                </div>
                <div class="flex-1 min-w-0 hidden lg:block">
                    <p class="text-sm font-bold text-white truncate">{{ roleService.user.name }}</p>
                    <div class="flex items-center gap-1.5">
                        <svg class="w-3 h-3" [ngClass]="roleService.roleColor" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                [attr.d]="roleIcons[roleService.currentRole]" />
                        </svg>
                        <span class="text-xs font-bold uppercase tracking-wider" [ngClass]="roleService.roleColor">
                            {{ roleService.user.roleLabel }}
                        </span>
                    </div>
                </div>
            </div>
        </div>


        <button (click)="signOut()"
            class="flex items-center gap-3 w-full px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors text-left group">
            <svg class="w-4 h-4 text-slate-500 group-hover:text-gosport-danger transition-colors" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="font-medium text-sm text-slate-500 group-hover:text-white hidden lg:block">Sign Out</span>
        </button>
    </div>
</aside>

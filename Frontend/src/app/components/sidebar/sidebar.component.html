<aside class="flex flex-col w-64 h-screen sticky top-0 bg-slate-950 border-r border-white/5 z-50">

    <!-- Logo -->
    <div class="p-6 flex items-center gap-2.5">
        <div class="w-7 h-7 bg-gosport-orange rounded-md flex items-center justify-center transform -skew-x-12 shadow-lg shadow-gosport-orange/20">
            <span class="font-black text-sm text-white transform skew-x-12">G</span>
        </div>
        <span class="font-black text-lg text-white tracking-tight">GOSPORT</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-2 space-y-6 overflow-y-auto custom-scrollbar">
        <div class="space-y-0.5">
            <p class="px-3 text-[9px] font-black text-slate-700 uppercase tracking-widest mb-3">Menu</p>
            <a *ngFor="let item of roleService.navItems" [routerLink]="item.path" 
                [ngClass]="isActive(item.path)
                   ? 'bg-gosport-orange/10 text-gosport-orange'
                   : 'text-slate-500 hover:bg-white/[0.02] hover:text-slate-300'"
                class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all group relative">
                <svg class="w-4 h-4 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
                </svg>
                <span class="text-[11px] font-bold uppercase tracking-wider">{{ item.label }}</span>
                <div *ngIf="isActive(item.path)" class="absolute right-3 w-1 h-1 rounded-full bg-gosport-orange shadow-[0_0_8px_rgba(249,115,22,1)]"></div>
            </a>
        </div>
    </nav>

    <!-- Footer -->
    <div class="p-3 border-t border-white/5 space-y-1">
        <div class="relative cursor-pointer" [routerLink]="['/dashboard/profile-view', roleService.currentRole, roleService.entityId]">
            <div class="flex items-center gap-3 p-2 rounded-xl w-full text-left group hover:bg-white/[0.02] transition-colors">
                <div class="w-8 h-8 rounded-full overflow-hidden bg-slate-900 border border-white/10 flex items-center justify-center">
                    <img *ngIf="roleService.user.avatar" [src]="roleService.user.avatar" class="w-full h-full object-cover">
                    <span *ngIf="!roleService.user.avatar" class="font-black text-white text-[10px]">{{ roleService.user.name.substring(0,2) }}</span>
                </div>
                <div class="flex-1 min-w-0 hidden lg:block">
                    <p class="text-[11px] font-bold text-white truncate leading-none mb-1">{{ roleService.user.name }}</p>
                    <span class="text-[8px] font-black uppercase tracking-widest px-1.5 py-0.5 rounded bg-white/5 text-slate-500 border border-white/5">
                        {{ roleService.user.roleLabel }}
                    </span>
                </div>
            </div>
        </div>

        <button (click)="signOut()" class="flex items-center gap-3 w-full px-3 py-2 rounded-xl hover:bg-red-500/10 transition-colors text-left group">
            <lucide-icon name="log-out" class="w-3.5 h-3.5 text-slate-600 group-hover:text-red-500 transition-colors" />
            <span class="font-bold text-[10px] text-slate-600 group-hover:text-white uppercase tracking-widest hidden lg:block">Sign Out</span>
        </button>
    </div>
</aside>

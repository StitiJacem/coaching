<div
  class="bg-gosport-surface border border-gosport-border p-5 rounded-2xl relative overflow-hidden group"
  [style.animation-delay]="delay + 's'"
  [@fadeInUp]>

  <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity transform group-hover:scale-110 duration-500">
    <ng-container *ngIf="iconName">
      <lucide-icon [name]="iconName" class="w-24 h-24 text-white" />
    </ng-container>
  </div>


  <div class="relative z-10">
    <div class="flex items-center gap-2 mb-2">
      <div class="p-2 bg-slate-800 rounded-lg border border-slate-700">
        <ng-container *ngIf="iconName">
          <lucide-icon [name]="iconName" class="w-5 h-5 text-gosport-orange" />
        </ng-container>
      </div>
      <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">{{ label }}</span>
    </div>

    <div class="mt-2">
      <h3 class="text-3xl font-display font-bold text-white tracking-wide">{{ value }}</h3>
      <p *ngIf="subtext" class="text-sm text-slate-400 font-medium mt-1 flex items-center gap-1">
        <span *ngIf="trend === 'up'" class="text-gosport-lime">↑</span>
        <span *ngIf="trend === 'down'" class="text-gosport-danger">↓</span>
        {{ subtext }}
      </p>
    </div>
  </div>
</div>

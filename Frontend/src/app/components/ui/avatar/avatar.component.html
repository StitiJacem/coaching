<div [class]="'relative inline-block ' + className">
  <div [class]="sizeClasses + ' rounded-full overflow-hidden bg-slate-700 border border-slate-600 flex items-center justify-center'">
    <img *ngIf="displaySrc" [src]="displaySrc" [alt]="alt || fallback" class="w-full h-full object-cover" />
    <span *ngIf="!displaySrc" class="font-bold text-white">{{ fallback }}</span>
  </div>
  <span
    *ngIf="status"
    [class]="'absolute bottom-0 right-0 block h-2.5 w-2.5 rounded-full ring-2 ring-gosport-surface ' + statusColors">
  </span>
</div>

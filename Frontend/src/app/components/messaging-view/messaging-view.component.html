<div class="flex flex-col md:flex-row gap-0 h-full overflow-hidden">
    <!-- Contacts Sidebar -->
    <div [ngClass]="isPopup ? 'w-full md:w-[130px]' : 'w-full md:w-[280px]'" class="flex flex-col bg-slate-900/40 border-r border-white/5 overflow-hidden shrink-0">
        <div class="p-3 space-y-2">
            <h3 *ngIf="!isPopup" class="text-[10px] font-black text-white uppercase tracking-widest">Messages</h3>
            <div class="flex gap-0.5 p-0.5 bg-black/40 rounded-lg">
                <button type="button" (click)="activeTab = 'discussions'" [class.bg-gosport-orange]="activeTab === 'discussions'" class="flex-1 py-1 text-[8px] font-black uppercase rounded transition-all">Chat</button>
                <button type="button" (click)="activeTab = 'contacts'" [class.bg-gosport-orange]="activeTab === 'contacts'" class="flex-1 py-1 text-[8px] font-black uppercase rounded transition-all">Contacts</button>
            </div>
            <div *ngIf="!isPopup" class="relative">
                <lucide-icon name="search" class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-slate-600"></lucide-icon>
                <input type="text" [(ngModel)]="searchText" placeholder="Search..." class="w-full bg-black/30 border border-white/5 rounded-md py-1.5 pl-8 pr-2 text-[10px] text-white outline-none focus:border-gosport-orange/30">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar px-1.5 space-y-0.5 pb-4">
            <div *ngFor="let item of (activeTab === 'discussions' ? filteredUnifiedList : filteredDiscoverableContacts)" 
                 (click)="onItemSelect(item)"
                 [ngClass]="{'bg-white/5': selectedConversation?.id === item.id}"
                 class="flex items-center gap-2.5 p-2 rounded-lg cursor-pointer hover:bg-white/[0.03] transition-all group">
                <app-avatar [src]="item.participant?.photo_url || item.participant?.avatar || item.photo_url" size="sm"></app-avatar>
                <div *ngIf="!isPopup" class="flex-1 min-w-0">
                    <p class="text-[11px] font-bold text-white truncate leading-tight">{{ item.participant?.first_name || item.first_name }}</p>
                    <p class="text-[9px] text-slate-500 truncate mt-0.5">{{ item.lastMessage || item.subtitle }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col min-w-0 bg-black/10">
        <ng-container *ngIf="selectedConversation; else emptyState">
            <div class="p-3 border-b border-white/5 flex items-center justify-between bg-white/[0.01]">
                <div class="flex items-center gap-2.5">
                    <app-avatar [src]="getParticipant(selectedConversation)?.photo_url" size="sm"></app-avatar>
                    <div>
                        <p class="text-xs font-black text-white tracking-tight leading-none">{{ getParticipant(selectedConversation)?.first_name }}</p>
                        <p class="text-[8px] text-emerald-500 uppercase font-black tracking-widest mt-1">Online</p>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar" id="chat-container-inner">
                <div *ngFor="let msg of messages" class="flex" [ngClass]="msg.senderId === roleService.user.id ? 'justify-end' : 'justify-start'">
                    <div [ngClass]="msg.senderId === roleService.user.id ? 'bg-gosport-orange text-white rounded-t-xl rounded-bl-xl' : 'bg-white/5 border border-white/5 text-slate-200 rounded-t-xl rounded-br-xl'"
                         class="max-w-[85%] px-3 py-2 bubble-animate">
                        <p class="text-[11px] leading-relaxed">{{ msg.content }}</p>
                        <span class="text-[8px] opacity-40 block mt-1 text-right">{{ msg.created_at | date:'HH:mm' }}</span>
                    </div>
                </div>
            </div>
            <div class="p-3 bg-black/20">
                <form (submit)="sendMessage()" class="flex gap-2">
                    <input type="text" [(ngModel)]="newMessage" name="newMessage" placeholder="Message..." class="flex-1 bg-black/40 border border-white/5 rounded-lg px-3 py-1.5 text-xs text-white outline-none focus:border-gosport-orange/30">
                    <button type="submit" [disabled]="!newMessage.trim()" class="w-8 h-8 flex items-center justify-center bg-gosport-orange rounded-lg hover:scale-105 active:scale-95 transition-all disabled:opacity-30">
                        <lucide-icon name="send" class="w-3 h-3 text-white"></lucide-icon>
                    </button>
                </form>
            </div>
        </ng-container>
        <ng-template #emptyState>
            <div class="flex-1 flex flex-col items-center justify-center p-8 opacity-20">
                <lucide-icon name="message-square" class="w-8 h-8 mb-3"></lucide-icon>
                <p class="text-[9px] font-black uppercase tracking-widest">Select a conversation</p>
            </div>
        </ng-template>
    </div>
</div>

<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" (click)="close.emit()"></div>

    <div
        class="relative bg-gosport-surface border border-gosport-border rounded-3xl w-full max-w-5xl h-[85vh] overflow-hidden flex flex-col shadow-2xl animate-in zoom-in duration-300">

        <!-- Header -->
        <div class="px-6 py-4 border-b border-gosport-border flex items-center justify-between bg-black/20">
            <div class="flex items-center gap-4">
                <input type="text" [(ngModel)]="workoutTitle" placeholder="Name your workout"
                    class="bg-transparent border-none text-xl font-black text-white italic uppercase focus:outline-none focus:border-b focus:border-gosport-orange w-56 placeholder:text-slate-600">
                <div class="flex items-center gap-1 bg-slate-800/50 p-1 rounded-lg">
                    <button *ngFor="let type of ['Strength', 'Cardio', 'HIIT', 'Mobility']" (click)="workoutType = type"
                        [ngClass]="workoutType === type ? 'bg-gosport-orange text-white' : 'text-slate-400'"
                        class="px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-widest transition-all">{{
                        type }}</button>
                </div>
            </div>
            <button (click)="close.emit()" class="p-1.5 text-slate-500 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <!-- Left: Exercise Library (grid of thumbnails like Everfit) -->
            <div class="w-72 border-r border-gosport-border flex flex-col bg-black/10 flex-shrink-0">
                <!-- Search -->
                <div class="p-3 border-b border-gosport-border space-y-2">
                    <div class="relative">
                        <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()"
                            placeholder="Search exercises..."
                            class="w-full bg-gosport-surface border border-gosport-border rounded-lg px-8 py-2 text-xs text-white focus:border-gosport-orange outline-none transition-all">
                        <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button *ngFor="let part of bodyParts" (click)="filterByBodyPart(part.id)"
                            [ngClass]="activeBodyPart === part.id ? 'bg-gosport-orange text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10'"
                            class="px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-tighter transition-all">{{
                            part.label }}</button>
                    </div>
                </div>

                <!-- Exercise Grid — 2 columns like Everfit -->
                <div class="flex-1 overflow-y-auto p-3 custom-scrollbar">
                    <div *ngIf="isLoadingLibrary" class="flex justify-center py-8">
                        <div
                            class="w-6 h-6 border-2 border-gosport-orange border-t-transparent rounded-full animate-spin">
                        </div>
                    </div>

                    <p *ngIf="!isLoadingLibrary"
                        class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-2">Most Recent ({{
                        library.length }})</p>

                    <div class="grid grid-cols-2 gap-2">
                        <div *ngFor="let ex of library" (click)="addToWorkout(ex)"
                            class="relative group cursor-pointer rounded-xl overflow-hidden bg-black/40 border border-transparent hover:border-gosport-orange transition-all aspect-square">
                            <img [src]="ex.videoId ? 'https://img.youtube.com/vi/' + ex.videoId + '/mqdefault.jpg' : ex.gifUrl"
                                [alt]="ex.name"
                                class="w-full h-full object-cover group-hover:scale-105 transition-all duration-300">
                            <!-- Video indicator -->
                            <div *ngIf="ex.videoId"
                                class="absolute top-1 left-1 bg-black/70 text-[7px] text-red-400 font-black px-1 rounded flex items-center gap-0.5">
                                <svg class="w-2 h-2" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                                VIDEO
                            </div>
                            <!-- Overlay -->
                            <div
                                class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent flex flex-col justify-end p-2">
                                <p class="text-[9px] font-black text-white capitalize leading-tight">{{ ex.name }}</p>
                                <p class="text-[7px] text-slate-400 capitalize mt-0.5">{{ ex.bodyPart }}</p>
                            </div>
                            <!-- Add overlay on hover -->
                            <div
                                class="absolute inset-0 bg-gosport-orange/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                                <div class="w-8 h-8 bg-gosport-orange rounded-full flex items-center justify-center">
                                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                            d="M12 4v16m8-8H4" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Workout Canvas -->
            <div class="flex-1 flex flex-col">
                <!-- Canvas area -->
                <div class="flex-1 overflow-y-auto p-5 space-y-3 custom-scrollbar">
                    <!-- Empty state -->
                    <div *ngIf="exercises.length === 0"
                        class="h-full flex flex-col items-center justify-center text-center text-slate-600">
                        <svg class="w-14 h-14 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 4v16m8-8H4" />
                        </svg>
                        <p class="font-bold text-sm">Drag exercises from the left to add</p>
                    </div>

                    <!-- Exercise Rows on Canvas -->
                    <div *ngFor="let item of exercises; let i = index"
                        class="bg-black/30 border border-gosport-border rounded-2xl overflow-hidden hover:border-slate-600 transition-all">

                        <div class="flex items-center gap-4 p-4">
                            <!-- Thumbnail -->
                            <div
                                class="w-16 h-16 rounded-xl overflow-hidden border border-slate-800 flex-shrink-0 bg-black/40">
                                <img [src]="item.videoId ? 'https://img.youtube.com/vi/' + item.videoId + '/default.jpg' : item.gifUrl"
                                    [alt]="item.name" class="w-full h-full object-cover">
                            </div>

                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between mb-3">
                                    <div>
                                        <p class="font-black text-white text-sm uppercase italic capitalize truncate">{{
                                            item.name }}</p>
                                        <p class="text-[9px] text-slate-500 uppercase tracking-widest">{{ item.bodyPart
                                            }}</p>
                                    </div>
                                    <div class="flex items-center gap-2 flex-shrink-0">
                                        <button *ngIf="item.videoId" (click)="toggleVideo(item)"
                                            [ngClass]="playingVideoId === item.videoId ? 'bg-red-600 text-white' : 'bg-white/5 text-red-400'"
                                            class="flex items-center gap-1 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all border border-red-600/20">
                                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M8 5v14l11-7z" />
                                            </svg>
                                            {{ playingVideoId === item.videoId ? 'Stop' : 'Demo' }}
                                        </button>
                                        <button (click)="removeExercise(i)"
                                            class="p-1.5 text-slate-600 hover:text-red-500 transition-colors">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-2">
                                    <div class="space-y-0.5">
                                        <label
                                            class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Sets</label>
                                        <input type="number" [(ngModel)]="item.sets"
                                            class="w-full bg-black/30 border border-white/5 rounded-lg px-2 py-1.5 text-white font-bold text-sm outline-none focus:border-gosport-orange transition-all">
                                    </div>
                                    <div class="space-y-0.5">
                                        <label
                                            class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Reps</label>
                                        <input type="number" [(ngModel)]="item.reps"
                                            class="w-full bg-black/30 border border-white/5 rounded-lg px-2 py-1.5 text-white font-bold text-sm outline-none focus:border-gosport-orange transition-all">
                                    </div>
                                    <div class="space-y-0.5">
                                        <label
                                            class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Rest(s)</label>
                                        <input type="number" [(ngModel)]="item.rest"
                                            class="w-full bg-black/30 border border-white/5 rounded-lg px-2 py-1.5 text-white font-bold text-sm outline-none focus:border-gosport-orange transition-all">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- YouTube Video Embed -->
                        <div *ngIf="playingVideoId === item.videoId && safeVideoUrl"
                            class="border-t border-gosport-border bg-black">
                            <div class="relative" style="padding-top: 40%">
                                <iframe [src]="safeVideoUrl" class="absolute inset-0 w-full h-full" frameborder="0"
                                    allowfullscreen allow="autoplay; encrypted-media"></iframe>
                            </div>
                            <p class="px-4 py-2 text-[9px] font-bold text-slate-500">{{ item.videoTitle }}</p>
                        </div>
                    </div>
                </div>

                <!-- Footer with Save & Close -->
                <div class="px-5 py-4 bg-black/30 border-t border-gosport-border flex items-center justify-between">
                    <p class="text-xs text-slate-500 font-bold">{{ exercises.length }} exercise{{ exercises.length !== 1
                        ? 's' : '' }} · {{ workoutType }}</p>
                    <div class="flex items-center gap-3">
                        <button (click)="close.emit()"
                            class="px-5 py-2.5 rounded-xl font-black uppercase tracking-widest text-xs text-slate-500 hover:text-white transition-all">Discard</button>
                        <button (click)="saveWorkout()" [disabled]="isSaving || exercises.length === 0"
                            class="bg-gosport-orange text-white px-8 py-2.5 rounded-xl font-black uppercase tracking-widest text-xs shadow-lg shadow-gosport-orange/30 hover:bg-orange-600 active:scale-95 transition-all disabled:opacity-50">
                            {{ isSaving ? 'Saving...' : 'Save & Close' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="min-h-screen flex items-center justify-center bg-[#0a0a0a] px-4 relative overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#FF6B35]/5 blur-[100px] rounded-full pointer-events-none"></div>

  <div class="max-w-md w-full glass rounded-3xl p-8 md:p-10 relative z-10 animate-fade-in text-center">
    <h2 class="text-3xl font-black text-white tracking-tight mb-8">Nouveau mot de passe</h2>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6 text-left">
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-gray-300 ml-1">Code de validation (6 chiffres)</label>
        <input
          type="text"
          formControlName="code"
          maxlength="6"
          class="w-full pl-4 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-[#FF6B35] tracking-widest text-center text-xl"
          placeholder="000000"
        >
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold text-gray-300 ml-1">Nouveau mot de passe</label>
        <input
          type="password"
          formControlName="newPassword"
          class="w-full pl-4 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-[#FF6B35]"
          placeholder="••••••••"
        >
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold text-gray-300 ml-1">Confirmer le mot de passe</label>
        <input
          type="password"
          formControlName="confirmPassword"
          class="w-full pl-4 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-[#FF6B35]"
          placeholder="••••••••"
        >
        <div *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.errors?.['mismatch']" class="text-red-400 text-xs mt-1 ml-1">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/50 text-red-500 text-center text-sm p-3.5 rounded-xl">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="bg-green-500/10 border border-green-500/50 text-green-500 text-center text-sm p-3.5 rounded-xl">
        {{ successMessage }}
      </div>

      <button
        type="submit"
        [disabled]="resetForm.invalid || loading"
        class="w-full btn-primary !py-4 shadow-[0_0_25px_rgba(255,107,53,0.2)]"
      >
        {{ loading ? 'Réinitialisation...' : 'Réinitialiser' }}
      </button>
    </form>
  </div>
</div>

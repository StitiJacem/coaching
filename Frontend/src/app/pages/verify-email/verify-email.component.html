<div class="min-h-screen flex items-center justify-center bg-[#0a0a0a] px-4 relative overflow-hidden">

    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#FF6B35]/5 blur-[100px] rounded-full pointer-events-none">
    </div>

    <div class="max-w-md w-full glass rounded-3xl p-8 md:p-10 relative z-10 animate-fade-in text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-[#FF6B35]/15 rounded-3xl flex items-center justify-center mx-auto mb-6 text-4xl animate-bounce"
                style="animation-duration: 3s">
                📧
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight mb-2">Vérification</h2>
            <p class="text-gray-400">
                Un code a été envoyé à<br>
                <span class="text-[#FF6B35] font-bold tracking-tight">{{ email }}</span>
            </p>
        </div>

        <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div class="space-y-4">
                <label for="code" class="block text-sm font-semibold text-gray-300">
                    Entrez le code reçu
                </label>
                <input type="text" id="code" formControlName="code" maxlength="6"
                    class="w-full px-4 py-5 text-center text-4xl font-black tracking-[0.5em] rounded-2xl bg-white/5 border border-white/10 text-[#FF6B35] focus:outline-none focus:border-[#FF6B35] focus:bg-white/10 transition-all duration-500 shadow-inner"
                    placeholder="000000">
                <div *ngIf="verifyForm.get('code')?.touched && verifyForm.get('code')?.invalid"
                    class="text-red-400 text-xs mt-2 animate-fade-in">
                    <span *ngIf="verifyForm.get('code')?.errors?.['required']">Le code est requis</span>
                    <span *ngIf="verifyForm.get('code')?.errors?.['pattern']">Le code doit contenir 6 chiffres</span>
                </div>
            </div>

            <div class="glass py-3 px-4 rounded-2xl inline-block mx-auto border border-white/5">
                <span class="text-gray-400 text-sm">Validité : </span>
                <span class="font-black" [class.text-[#FF6B35]]="timeLeft > 60" [class.text-red-500]="timeLeft <= 60">
                    {{ getFormattedTime() }}
                </span>
            </div>

            <div *ngIf="timeLeft <= 0"
                class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-4 rounded-2xl animate-fade-in">
                ⚠️ Le code a expiré. Demandez-en un nouveau.
            </div>

            <div *ngIf="errorMessage"
                class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-4 rounded-2xl animate-fade-in">
                {{ errorMessage }}
            </div>

            <div *ngIf="successMessage"
                class="bg-green-500/10 border border-green-500/50 text-green-500 text-sm p-4 rounded-2xl animate-fade-in">
                {{ successMessage }}
            </div>

            <button type="submit" [disabled]="verifyForm.invalid || timeLeft <= 0"
                class="w-full btn-primary !py-4 shadow-[0_0_25px_rgba(255,107,53,0.2)]">
                Vérifier mon compte
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-white/5">
            <p class="text-gray-400 text-sm mb-4">Code non reçu ?</p>
            <button (click)="resendCode()" [disabled]="resending"
                class="text-[#FF6B35] hover:text-[#ff8a63] font-black tracking-tight transition-all duration-300 flex items-center justify-center gap-2 mx-auto disabled:opacity-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" [class.animate-spin]="resending" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                {{ resending ? 'Envoi...' : 'Renvoyer le code' }}
            </button>
        </div>
    </div>
</div>

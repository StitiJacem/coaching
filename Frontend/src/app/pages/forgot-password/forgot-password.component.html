<div class="min-h-screen flex items-center justify-center bg-[#0a0a0a] px-4 relative overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#FF6B35]/5 blur-[100px] rounded-full pointer-events-none"></div>

  <div class="max-w-md w-full glass rounded-3xl p-8 md:p-10 relative z-10 animate-fade-in">
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-[#FF6B35]/15 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl">🔑</span>
      </div>
      <h2 class="text-3xl font-black text-white tracking-tight">Mot de passe oublié</h2>
      <p class="text-gray-400 mt-2 text-sm">Entrez votre email pour recevoir un code de réinitialisation</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label for="email" class="block text-sm font-semibold text-gray-300 ml-1">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          class="w-full pl-4 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-[#FF6B35] focus:bg-white/10 transition-all duration-300"
          placeholder="votre@email.com"
        >
      </div>

      <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/50 text-red-500 text-center text-sm p-3.5 rounded-xl animate-fade-in">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="bg-green-500/10 border border-green-500/50 text-green-500 text-center text-sm p-3.5 rounded-xl animate-fade-in">
        {{ successMessage }}
      </div>

      <button 
        type="submit" 
        [disabled]="forgotForm.invalid || loading"
        class="w-full btn-primary !py-4 shadow-[0_0_25px_rgba(255,107,53,0.2)]"
      >
        {{ loading ? 'Envoi...' : 'Envoyer le code' }}
      </button>
    </form>

    <div class="mt-8 text-center">
      <a routerLink="/login" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">
        ← Retour à la connexion
      </a>
    </div>
  </div>
</div>

<app-dashboard-layout>
  <div class="max-w-6xl mx-auto animate-fade-in pb-20 px-4 sm:px-6 lg:px-8">
    
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 border-b border-white/5 pb-6">
      <div class="space-y-0.5">
        <h1 class="text-xl md:text-2xl font-black text-white uppercase tracking-tight italic">Mon Profil</h1>
        <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Paramètres du compte & Infos personnelles</p>
      </div>
      
      <!-- Quick Role Badge -->
      <div class="flex items-center gap-3">
        <div class="px-4 py-2 bg-slate-900/80 border border-white/5 rounded-2xl flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          <span class="text-[9px] font-black text-white uppercase tracking-wider">Account: {{ role | titlecase }}</span>
        </div>
      </div>
    </div>

    <!-- Layout Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-8 items-start">
      
      <!-- Left Column: Mini Profile & Nav -->
      <div class="space-y-6">
        
        <div class="bg-slate-900/40 border border-white/5 rounded-3xl p-6 flex flex-col items-center text-center relative overflow-hidden group">
          <div class="relative group cursor-pointer mb-4" (click)="fileInput.click()">
            <div class="w-20 h-20 rounded-full overflow-hidden border-2 border-white/10 shadow-xl relative transition-all duration-300 group-hover:border-gosport-orange/50">
              <img [src]="user.avatar || 'https://ui-avatars.com/api/?name=' + user.first_name + '+' + user.last_name + '&background=f97316&color=fff'" 
                   class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
              <div class="absolute inset-0 bg-black/55 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                <lucide-icon name="camera" class="w-5 h-5 text-white"></lucide-icon>
              </div>
            </div>
            <input #fileInput type="file" (change)="onPhotoSelected($event)" accept="image/*" class="hidden">
          </div>
          
          <h2 class="text-base font-bold text-white leading-tight truncate max-w-full">{{ user.first_name }} {{ user.last_name }}</h2>
          <p class="text-slate-500 text-[10px] mt-1 truncate max-w-full">{{ user.email }}</p>
        </div>

        <!-- Nav Panel -->
        <div class="bg-slate-900/40 border border-white/5 rounded-3xl p-2 space-y-0.5">
          <button (click)="activeTab = 'general'"
                  [class.bg-gosport-orange]="activeTab === 'general'"
                  [class.text-white]="activeTab === 'general'"
                  [class.text-slate-500]="activeTab !== 'general'"
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl font-black uppercase tracking-widest text-[9px] text-left transition-all hover:bg-white/[0.02]">
            <lucide-icon name="user" class="w-3.5 h-3.5"></lucide-icon> General Info
          </button>
          
          <button (click)="activeTab = 'role'"
                  [class.bg-gosport-orange]="activeTab === 'role'"
                  [class.text-white]="activeTab === 'role'"
                  [class.text-slate-500]="activeTab !== 'role'"
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl font-black uppercase tracking-widest text-[9px] text-left transition-all hover:bg-white/[0.02]">
            <lucide-icon [name]="(role === 'coach' || role === 'nutritionist') ? 'briefcase' : 'activity'" class="w-3.5 h-3.5"></lucide-icon>
            {{ (role === 'coach' || role === 'nutritionist') ? 'Pro Details' : 'Physical Data' }}
          </button>
          
          <button (click)="activeTab = 'security'"
                  [class.bg-gosport-orange]="activeTab === 'security'"
                  [class.text-white]="activeTab === 'security'"
                  [class.text-slate-500]="activeTab !== 'security'"
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl font-black uppercase tracking-widest text-[9px] text-left transition-all hover:bg-white/[0.02]">
            <lucide-icon name="shield" class="w-3.5 h-3.5"></lucide-icon> Security
          </button>
        </div>
      </div>

      <!-- Right Column: Forms -->
      <div class="space-y-6">
        
        <!-- General Info Section -->
        <div *ngIf="activeTab === 'general'" class="bg-slate-900/40 border border-white/5 rounded-[2rem] p-8 animate-in fade-in duration-300">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-white/5 pb-6 mb-8">
            <div>
              <h2 class="text-lg font-black text-white uppercase tracking-tight">General Info</h2>
              <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mt-1">Manage your public profile details</p>
            </div>
            <button (click)="updateGeneral()" [disabled]="isLoading"
                    class="px-5 py-2.5 bg-gosport-orange text-white rounded-xl font-black uppercase tracking-widest text-[9px] shadow-lg shadow-gosport-orange/10 hover:scale-105 active:scale-95 transition-all disabled:opacity-50 flex items-center gap-2">
              <lucide-icon name="save" class="w-3 h-3" *ngIf="!isLoading"></lucide-icon>
              {{ isLoading ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-1.5">
              <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">First Name</label>
              <input type="text" [(ngModel)]="generalForm.first_name" 
                     class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none transition-all text-xs">
            </div>
            <div class="space-y-1.5">
              <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Last Name</label>
              <input type="text" [(ngModel)]="generalForm.last_name" 
                     class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none transition-all text-xs">
            </div>
            <div class="space-y-1.5">
              <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Email</label>
              <input type="email" [(ngModel)]="generalForm.email" disabled
                     class="w-full bg-black/10 border border-white/5 rounded-xl py-3 px-4 text-slate-600 font-bold outline-none cursor-not-allowed text-xs">
            </div>
            <div class="space-y-1.5">
              <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Phone</label>
              <input type="text" [(ngModel)]="generalForm.phone" 
                     class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none transition-all text-xs"
                     placeholder="+000 00 000 000">
            </div>
          </div>
        </div>

        <!-- Role Profile Section -->
        <div *ngIf="activeTab === 'role'" class="bg-slate-900/40 border border-white/5 rounded-[2rem] p-8 animate-in fade-in duration-300">
          <div *ngIf="role === 'athlete'" class="space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-white/5 pb-6 mb-8">
              <div>
                <h2 class="text-lg font-black text-white uppercase tracking-tight">Physical Data</h2>
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mt-1">Manage your performance stats</p>
              </div>
              <button (click)="updateRoleProfile()" [disabled]="isLoading"
                      class="px-5 py-2.5 bg-gosport-orange text-white rounded-xl font-black uppercase tracking-widest text-[9px] shadow-lg shadow-gosport-orange/10 hover:scale-105 active:scale-95 transition-all">
                Save Stats
              </button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
              <div class="space-y-1.5">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Weight (kg)</label>
                <input type="number" [(ngModel)]="athleteForm.weight" class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none text-xs">
              </div>
              <div class="space-y-1.5">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Height (cm)</label>
                <input type="number" [(ngModel)]="athleteForm.height" class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none text-xs">
              </div>
              <div class="space-y-1.5">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Primary Sport</label>
                <input type="text" [(ngModel)]="athleteForm.sport" class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none text-xs">
              </div>
              <div class="space-y-1.5">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Objective</label>
                <select [(ngModel)]="athleteForm.primaryObjective" class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none text-xs appearance-none">
                  <option value="weight_loss">Weight Loss</option>
                  <option value="muscle_gain">Muscle Gain</option>
                  <option value="strength">Strength</option>
                  <option value="general_fitness">General Fitness</option>
                </select>
              </div>
              <div class="space-y-1.5">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Target (ex: -10kg)</label>
                <input type="text" [(ngModel)]="athleteForm.targetMetric" class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none text-xs">
              </div>
              <div class="space-y-1.5">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Level</label>
                <select [(ngModel)]="athleteForm.experienceLevel" class="w-full bg-black/20 border border-white/5 rounded-xl py-3 px-4 text-white font-bold focus:border-gosport-orange/30 outline-none text-xs appearance-none">
                  <option value="beginner">Beginner</option>
                  <option value="intermediate">Intermediate</option>
                  <option value="advanced">Advanced</option>
                </select>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast -->
  <div *ngIf="message" 
       [ngClass]="message.type === 'success' ? 'bg-gosport-lime text-black' : 'bg-red-500 text-white'"
       class="fixed bottom-6 right-6 px-6 py-3 rounded-xl font-black uppercase tracking-widest text-[9px] shadow-2xl animate-in fade-in slide-in-from-right-5 duration-300 z-[500] flex items-center gap-2">
    <lucide-icon [name]="message.type === 'success' ? 'check-circle' : 'alert-triangle'" class="w-3 h-3"></lucide-icon>
    {{ message.text }}
  </div>
</app-dashboard-layout>

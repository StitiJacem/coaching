<app-dashboard-layout>
  <div class="max-w-6xl mx-auto space-y-6">
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <p class="text-slate-400 font-bold uppercase tracking-wider text-xs mb-1">Diet Master</p>
        <h1 class="text-4xl font-display font-black text-white uppercase italic leading-none">Plan Builder</h1>
      </div>
      <div class="flex gap-2">
        <button [routerLink]="['/dashboard']" class="px-5 py-2.5 rounded-xl border border-slate-700 text-slate-300 font-bold text-sm hover:bg-slate-800 transition-colors uppercase tracking-widest">
          Cancel
        </button>
        <button (click)="savePlan()" class="px-5 py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-sm transition-colors uppercase tracking-widest shadow-lg shadow-emerald-500/20">
          Save Template
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      
      
      <div class="lg:col-span-1 space-y-4">
        <div class="bg-gosport-surface border border-gosport-border rounded-2xl p-6">
          <div class="space-y-4">
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Plan Name</label>
              <input type="text" [(ngModel)]="planData.name"
                  class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm font-bold focus:outline-none focus:border-gosport-orange transition-colors">
            </div>
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Goal</label>
              <select [(ngModel)]="planData.goal"
                  class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm font-bold focus:outline-none focus:border-gosport-orange transition-colors">
                  <option value="Fat Loss">Fat Loss</option>
                  <option value="Maintenance">Maintenance</option>
                  <option value="Muscle Gain">Muscle Gain</option>
              </select>
            </div>
          </div>
        </div>

        <div class="bg-gosport-surface border border-gosport-border rounded-2xl p-4">
          <div class="flex items-center justify-between mb-3">
             <h3 class="text-xs font-bold text-white uppercase tracking-widest">Days</h3>
             <button (click)="addDay()" class="text-gosport-orange hover:text-orange-400">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
             </button>
          </div>
          <div class="flex flex-col gap-2 max-h-96 overflow-y-auto pr-1">
             <button *ngFor="let day of planData.days; let i = index"
                     (click)="activeDayIndex = i"
                     class="flex items-center justify-between p-3 rounded-xl border text-left transition-all"
                     [class.bg-gosport-orange]="activeDayIndex === i"
                     [class.border-gosport-orange]="activeDayIndex === i"
                     [class.text-white]="activeDayIndex === i"
                     [class.bg-slate-800]="activeDayIndex !== i"
                     [class.border-slate-800]="activeDayIndex !== i"
                     [class.text-slate-400]="activeDayIndex !== i">
                <span class="text-sm font-bold tracking-wider">Day {{ i+1 }}</span>
                <span *ngIf="planData.days!.length > 1 && activeDayIndex === i" (click)="removeDay(i); $event.stopPropagation()" class="p-1 hover:bg-black/20 rounded">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </span>
             </button>
          </div>
        </div>
      </div>

      
      <div class="lg:col-span-3">
        <div class="bg-gosport-surface border border-gosport-border rounded-2xl p-6 min-h-[500px]" *ngIf="planData.days && planData.days[activeDayIndex]">
           <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
             <h2 class="text-2xl font-display font-bold text-white tracking-wide">Day {{ activeDayIndex + 1 }} Meals</h2>
             <button (click)="addMeal(activeDayIndex)" class="px-4 py-2 rounded-lg bg-gosport-orange text-white text-[10px] font-black uppercase tracking-widest hover:bg-orange-600 transition-colors flex items-center gap-2">
               <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Add Meal
             </button>
           </div>
           
           <div class="space-y-4">
             <div *ngFor="let meal of planData.days[activeDayIndex].meals; let mi = index" 
                  class="bg-slate-900/50 border border-slate-800 rounded-xl p-5">
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                   <div class="flex-1 space-y-3">
                      <div class="flex gap-2">
                        <select [(ngModel)]="meal.mealType" class="flex-1 bg-black/40 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm font-bold focus:outline-none focus:border-gosport-orange">
                          <option value="Breakfast">Breakfast</option>
                          <option value="Lunch">Lunch</option>
                          <option value="Dinner">Dinner</option>
                          <option value="Snack">Snack</option>
                          <option value="Pre-Workout">Pre-Workout</option>
                          <option value="Post-Workout">Post-Workout</option>
                        </select>
                        <input type="time" [(ngModel)]="meal.timeOfDay" class="bg-black/40 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-gosport-orange w-32">
                        <button (click)="removeMeal(activeDayIndex, mi)" class="p-2 text-slate-500 hover:text-red-400 bg-black/40 border border-slate-700 rounded-lg transition-colors">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                      </div>
                      <textarea [(ngModel)]="meal.instructions" placeholder="Enter food items (e.g. 200g Chicken, 150g Rice)" rows="2"
                                class="w-full bg-black/40 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-gosport-orange resize-none"></textarea>
                   </div>
                   <div class="flex flex-row md:flex-col gap-2 md:w-32">
                     <div class="flex items-center gap-2">
                       <input type="number" [(ngModel)]="meal.calories" placeholder="kcal" class="w-full bg-black/40 border border-slate-700 rounded-lg px-2 py-1.5 text-white text-xs text-right focus:outline-none focus:border-gosport-orange">
                       <span class="text-[10px] text-slate-500 font-bold w-6">cal</span>
                     </div>
                     <div class="flex items-center gap-2">
                       <input type="number" [(ngModel)]="meal.protein" placeholder="Prot" class="w-full bg-black/40 border border-slate-700 rounded-lg px-2 py-1.5 text-rose-400 text-xs text-right focus:outline-none focus:border-rose-500">
                       <span class="text-[10px] text-rose-500 font-bold w-6">P</span>
                     </div>
                     <div class="flex items-center gap-2">
                       <input type="number" [(ngModel)]="meal.carbs" placeholder="Carbs" class="w-full bg-black/40 border border-slate-700 rounded-lg px-2 py-1.5 text-blue-400 text-xs text-right focus:outline-none focus:border-blue-500">
                       <span class="text-[10px] text-blue-500 font-bold w-6">C</span>
                     </div>
                     <div class="flex items-center gap-2">
                       <input type="number" [(ngModel)]="meal.fats" placeholder="Fats" class="w-full bg-black/40 border border-slate-700 rounded-lg px-2 py-1.5 text-amber-400 text-xs text-right focus:outline-none focus:border-amber-500">
                       <span class="text-[10px] text-amber-500 font-bold w-6">F</span>
                     </div>
                   </div>
                </div>
             </div>
             
             <div *ngIf="planData.days[activeDayIndex].meals?.length === 0" class="text-center py-12 border-2 border-dashed border-slate-800 rounded-xl">
               <p class="text-slate-500 text-sm font-bold uppercase tracking-widest">No meals added to this day.</p>
             </div>
           </div>
        </div>
      </div>
      
    </div>
  </div>
</app-dashboard-layout>

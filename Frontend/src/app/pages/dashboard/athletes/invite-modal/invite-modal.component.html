<div
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
    <div
        class="bg-gosport-dark border border-white/10 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-white/5 flex items-center justify-between bg-white/5">
            <h3 class="text-xl font-bold text-white">Invite New Athlete</h3>
            <button (click)="close.emit()" class="text-white/40 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6">
            <div *ngIf="success"
                class="flex flex-col items-center justify-center py-8 text-center animate-in zoom-in-95">
                <div
                    class="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h4 class="text-lg font-bold text-white mb-2">Invitation Sent!</h4>
                <p class="text-white/60">An invitation has been sent to the athlete's email.</p>
            </div>

            <form [formGroup]="inviteForm" (ngSubmit)="onSubmit()" *ngIf="!success">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-white/60 mb-1.5 ml-1">Athlete Email</label>
                    <input type="email" formControlName="email"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:border-gosport-orange transition-all"
                        placeholder="athlete@example.com">
                    <div *ngIf="inviteForm.get('email')?.touched && inviteForm.get('email')?.invalid"
                        class="text-red-400 text-xs mt-1 ml-1">
                        Please enter a valid email address.
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-white/60 mb-1.5 ml-1">Personal Message
                        (Optional)</label>
                    <textarea formControlName="message" rows="3"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:border-gosport-orange transition-all resize-none"
                        placeholder="Hi! I'd love to coach you on GoSport..."></textarea>
                </div>

                <div *ngIf="error"
                    class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-sm">
                    {{ error }}
                </div>

                <div class="flex gap-3">
                    <button type="button" (click)="close.emit()"
                        class="flex-1 px-6 py-3 rounded-xl font-bold bg-white/5 text-white hover:bg-white/10 transition-all active:scale-[0.98]">
                        Cancel
                    </button>
                    <button type="submit" [disabled]="inviteForm.invalid || loading"
                        class="flex-1 px-6 py-3 rounded-xl font-bold bg-gosport-orange text-white hover:bg-orange-600 shadow-lg shadow-gosport-orange/25 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                        <svg *ngIf="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Invite
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

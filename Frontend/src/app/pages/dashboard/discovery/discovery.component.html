<app-dashboard-layout>
    <div class="space-y-8 animate-fade-in">

        <header class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <p class="text-slate-400 font-bold uppercase tracking-wider text-sm mb-1">Ecosystem</p>
                <h1 class="text-5xl md:text-6xl font-display font-bold text-white uppercase leading-none">Find a Coach
                </h1>
                <p class="text-slate-500 mt-2">Connect with elite specialists to elevate your performance.</p>
            </div>
        </header>


        <div class="flex flex-wrap gap-2">
            <button *ngFor="let spec of specializations" (click)="setFilter(spec.id)" [ngClass]="activeFilter === spec.id
                    ? 'bg-galio-orange text-white'
                    : 'bg-slate-800 text-slate-400 hover:text-white'"
                class="px-5 py-2.5 rounded-xl font-bold uppercase tracking-widest text-[10px] transition-all duration-200">
                {{ spec.label }}
            </button>
        </div>


        <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20 animate-pulse">
            <div class="w-12 h-12 border-4 border-galio-orange border-t-transparent rounded-full animate-spin mb-4">
            </div>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Scanning Ecosystem...</p>
        </div>


        <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div *ngFor="let coach of filteredCoaches"
                class="group bg-galio-surface border border-galio-border hover:border-slate-600 rounded-3xl p-6 transition-all duration-300 transform hover:-translate-y-1">
                <div class="flex items-start justify-between mb-6">
                    <div class="relative">
                        <div class="w-20 h-20 rounded-2xl overflow-hidden border-2 border-slate-800">
                            <img [src]="coach.avatar" [alt]="coach.name" class="w-full h-full object-cover">
                        </div>
                        <div *ngIf="coach.verified"
                            class="absolute -bottom-2 -right-2 w-7 h-7 bg-galio-lime rounded-full border-4 border-galio-surface flex items-center justify-center text-galio-dark">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-display font-bold text-white tracking-tight">{{ coach.price }}<span
                                class="text-xs text-slate-500 uppercase ml-1">TND/h</span></p>
                        <div class="flex items-center justify-end gap-1 text-galio-orange mt-1">
                            <span class="text-xs font-black">{{ coach.rating }}</span>
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                <path
                                    d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <h3 class="text-xl font-bold text-white mb-2 uppercase">{{ coach.name }}</h3>
                <p class="text-slate-400 text-sm line-clamp-2 mb-6">{{ coach.bio }}</p>


                <div class="flex flex-wrap gap-2 mb-8">
                    <span *ngFor="let spec of coach.specializations"
                        class="px-2 py-0.5 bg-slate-800 rounded-lg text-[10px] font-black text-slate-400 tracking-tighter uppercase">
                        {{ spec }}
                    </span>
                </div>

                <button (click)="requestConnection(coach)"
                    class="w-full py-3 bg-white hover:bg-galio-orange text-black hover:text-white rounded-xl font-bold uppercase tracking-widest text-xs transition-all duration-300">
                    Connect with Coach
                </button>
            </div>
        </div>


        <div *ngIf="filteredCoaches.length === 0" class="py-20 text-center">
            <div
                class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 text-slate-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">No specialists found for this category
            </p>
        </div>
    </div>
</app-dashboard-layout>

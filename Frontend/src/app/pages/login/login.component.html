<div class="min-h-screen bg-galio-dark flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-galio-orange/10 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] bg-galio-lime/10 rounded-full blur-[120px]">
        </div>
        <div
            class="absolute inset-0 opacity-[0.03] bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:24px_24px]">
        </div>
    </div>

    <div class="w-full max-w-md relative z-10 animate-fade-in">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 bg-galio-orange rounded-2xl transform -skew-x-12 mb-6 shadow-lg shadow-galio-orange/20">
                <span class="font-display font-bold text-4xl text-white transform skew-x-12">E</span>
            </div>
            <h1 class="text-4xl font-display font-bold text-white mb-2 tracking-wide">WELCOME BACK</h1>
            <p class="text-slate-400">Sign in to access your workspace</p>
        </div>


        <div class="bg-galio-surface border border-galio-border rounded-2xl p-8 shadow-2xl">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Email
                        Address</label>
                    <div class="relative">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <input type="email" formControlName="email"
                            class="w-full bg-galio-surface border border-galio-border rounded-xl pl-10 pr-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-galio-orange focus:ring-1 focus:ring-galio-orange transition-colors duration-200"
                            placeholder="coach@escd.tn">
                    </div>
                </div>


                <div>
                    <div class="w-full">
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <input type="password" formControlName="password"
                                class="w-full bg-galio-surface border border-galio-border rounded-xl pl-10 pr-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-galio-orange focus:ring-1 focus:ring-galio-orange transition-colors duration-200"
                                placeholder="••••••••">
                        </div>
                    </div>
                    <div class="flex justify-end mt-2">
                        <a routerLink="/forgot-password"
                            class="text-xs font-bold text-galio-orange hover:text-orange-400 uppercase tracking-wide">
                            Forgot Password?
                        </a>
                    </div>
                </div>


                <div *ngIf="errorMessage"
                    class="bg-galio-danger/10 border border-galio-danger/20 text-galio-danger text-center text-sm p-3 rounded-xl font-medium">
                    {{ errorMessage }}
                </div>


                <button type="submit" [disabled]="loginForm.invalid"
                    class="w-full inline-flex items-center justify-center font-bold uppercase tracking-wider rounded-xl px-6 py-3 text-sm bg-galio-orange hover:bg-orange-600 text-white shadow-lg shadow-galio-orange/25 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-galio-dark focus:ring-galio-orange disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 active:scale-[0.98]">
                    Sign In
                    <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>


                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-galio-surface px-2 text-slate-500 font-bold tracking-wider">Or continue
                            with</span>
                    </div>
                </div>


                <div class="grid grid-cols-2 gap-4">
                    <button type="button" (click)="loginWithGoogle()" [disabled]="socialLoading"
                        class="inline-flex items-center justify-center font-bold uppercase tracking-wider rounded-xl px-3 py-2.5 text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 transition-all duration-200 w-full disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button type="button" (click)="loginWithFacebook()" [disabled]="socialLoading"
                        class="inline-flex items-center justify-center font-bold uppercase tracking-wider rounded-xl px-3 py-2.5 text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 transition-all duration-200 w-full disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="#1877F2">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg>
                        Facebook
                    </button>
                </div>


                <p class="text-center text-sm text-slate-400 mt-6">
                    Don't have an account?
                    <a routerLink="/signup"
                        class="font-bold text-white hover:text-galio-orange transition-colors ml-1">Sign Up</a>
                </p>
            </form>
        </div>


        <div class="mt-8 text-center">
            <p class="text-xs text-slate-500 uppercase tracking-widest">GALIOSPORT Sport Science Platform</p>
        </div>
    </div>
</div>
